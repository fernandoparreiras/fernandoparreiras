<svg width="1200" height="1320" viewBox="0 0 1200 1320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Fernando Parreiras faith, purpose and platform stack</title>
  <desc id="desc">Premium GitHub profile section showing faith-led purpose and the production platform stack used across Trustyu Forge, AI products, infrastructure, and agentic software.</desc>

  <defs>
    <linearGradient id="frameLine" x1="60" y1="0" x2="1140" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D8FF57"/>
      <stop offset="0.46" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="softPanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#05070A"/>
    </linearGradient>
    <linearGradient id="limePanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#112112"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="bluePanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#071B2B"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="purplePanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#15122A"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#1F2937" stroke-width="1" opacity="0.32"/>
    </pattern>
    <style>
      .bg { fill: #05070A; }
      .grid { fill: url(#grid); opacity: .7; }
      .panel { fill: url(#softPanel); stroke: #253044; stroke-width: 1; }
      .panel-lime { fill: url(#limePanel); stroke: #37513C; stroke-width: 1; }
      .panel-blue { fill: url(#bluePanel); stroke: #23465D; stroke-width: 1; }
      .panel-purple { fill: url(#purplePanel); stroke: #3A315E; stroke-width: 1; }
      .chip { fill: #0F172A; stroke: #293548; stroke-width: 1; }
      .chip-lime { fill: #111F18; stroke: #425C2E; stroke-width: 1; }
      .chip-blue { fill: #0D1C2A; stroke: #28526D; stroke-width: 1; }
      .chip-purple { fill: #17152A; stroke: #43366D; stroke-width: 1; }
      .text { fill: #E5E7EB; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #94A3B8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .soft { fill: #CBD5E1; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { fill: #F8FAFC; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 800; }
      .accent { fill: #D8FF57; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 800; }
      .blue { fill: #7DD3FC; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 800; }
      .purple { fill: #C4B5FD; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-weight: 800; }
      .mono { fill: #B6C2D1; font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .mono-strong { fill: #E2E8F0; font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="1320" rx="26"/>
  <rect class="grid" width="1200" height="1320" rx="26"/>
  <rect x="42" y="42" width="1116" height="1236" rx="16" fill="#020617" opacity="0.62" stroke="#253044"/>
  <rect x="62" y="64" width="1076" height="4" rx="2" fill="url(#frameLine)"/>

  <g transform="translate(80 108)">
    <text class="muted" x="0" y="0" font-size="13" letter-spacing="3">OPERATING FOUNDATION</text>
    <text class="title" x="0" y="48" font-size="42">Faith-led purpose. Production-grade AI stack.</text>
    <text class="soft" x="0" y="86" font-size="17">A professional profile section for the way I build: conviction, architecture, agents, data, security and measurable delivery.</text>
  </g>

  <g transform="translate(80 230)">
    <rect class="panel-lime" x="0" y="0" width="650" height="312" rx="8"/>
    <g transform="translate(28 30)">
      <rect x="0" y="0" width="54" height="54" rx="8" fill="#D8FF57" opacity="0.14" stroke="#D8FF57" stroke-opacity="0.42"/>
      <path d="M27 13V41M17 24H37" stroke="#D8FF57" stroke-width="4" stroke-linecap="round"/>
      <text class="accent" x="72" y="21" font-size="14" letter-spacing="2">FAITH, WORK AND PURPOSE</text>
      <text class="title" x="72" y="55" font-size="31">Jesus at the center.</text>
      <text class="soft" x="0" y="108" font-size="16">I am a Christian. I believe Jesus Christ is my only Savior,</text>
      <text class="soft" x="0" y="132" font-size="16">the center of my life, my family, and the work I build.</text>
      <text class="muted" x="0" y="172" font-size="15">Through POR.life, every business and initiative is aligned with a simple conviction:</text>
      <text class="text" x="0" y="198" font-size="17" font-weight="700">Jesus is the true CEO over purpose, strategy and execution.</text>
      <text class="text" x="0" y="224" font-size="17" font-weight="700">Ethics, people and impact follow from that center.</text>
    </g>

    <g transform="translate(28 270)">
      <rect class="chip-lime" x="0" y="0" width="180" height="40" rx="8"/>
      <text class="accent" x="18" y="25" font-size="13">POR.life</text>
      <rect class="chip" x="194" y="0" width="200" height="40" rx="8"/>
      <text class="muted" x="212" y="25" font-size="13">Purpose before scale</text>
      <rect class="chip" x="408" y="0" width="186" height="40" rx="8"/>
      <text class="muted" x="426" y="25" font-size="13">Stewardship by design</text>
    </g>
  </g>

  <g transform="translate(760 230)">
    <rect class="panel" x="0" y="0" width="360" height="146" rx="8"/>
    <g transform="translate(24 24)">
      <path d="M0 20H38M19 0V40" stroke="#7DD3FC" stroke-width="3" stroke-linecap="round"/>
      <text class="blue" x="58" y="17" font-size="14" letter-spacing="2">JOB 8:7</text>
      <text class="soft" x="0" y="72" font-size="15">Though thy beginning was small,</text>
      <text class="soft" x="0" y="96" font-size="15">yet thy latter end should greatly increase.</text>
    </g>
  </g>

  <g transform="translate(760 396)">
    <rect class="panel" x="0" y="0" width="360" height="146" rx="8"/>
    <g transform="translate(24 24)">
      <path d="M0 34C16 0 44 0 60 34M12 34H48" stroke="#C4B5FD" stroke-width="3" stroke-linecap="round"/>
      <text class="purple" x="78" y="17" font-size="14" letter-spacing="2">COLOSSIANS 3:23</text>
      <text class="soft" x="0" y="72" font-size="15">And whatsoever ye do, do it heartily,</text>
      <text class="soft" x="0" y="96" font-size="15">as to the Lord, and not unto men.</text>
    </g>
  </g>

  <g transform="translate(80 600)">
    <text class="muted" x="0" y="0" font-size="13" letter-spacing="3">PLATFORM STACK</text>
    <text class="title" x="0" y="46" font-size="39">The stack is not a badge wall. It is an operating system.</text>
    <text class="soft" x="0" y="82" font-size="16">Product surfaces, AI agents, data, cloud, quality gates and governance working as one delivery loop.</text>

    <g transform="translate(0 120)">
      <rect class="panel-blue" x="0" y="0" width="324" height="226" rx="8"/>
      <g transform="translate(24 24)">
        <rect x="0" y="0" width="46" height="46" rx="8" fill="#38BDF8" opacity="0.13" stroke="#38BDF8" stroke-opacity="0.42"/>
        <rect x="13" y="14" width="20" height="16" rx="3" stroke="#7DD3FC" stroke-width="2"/>
        <path d="M13 20H33" stroke="#7DD3FC" stroke-width="2"/>
        <text class="blue" x="60" y="18" font-size="13" letter-spacing="2">PRODUCT AND UX</text>
        <text class="title" x="60" y="45" font-size="23">Interfaces that ship</text>
        <text class="muted" x="0" y="82" font-size="14">Next.js 16, React 19, TypeScript 6,</text>
        <text class="muted" x="0" y="105" font-size="14">shadcn/ui, Radix UI, Tailwind CSS 4,</text>
        <text class="muted" x="0" y="128" font-size="14">TanStack Query, Zod, React Hook Form,</text>
        <text class="muted" x="0" y="151" font-size="14">Recharts, next-intl, pnpm 11, Vite/Vitest.</text>
      </g>
    </g>

    <g transform="translate(350 120)">
      <rect class="panel" x="0" y="0" width="324" height="226" rx="8"/>
      <g transform="translate(24 24)">
        <rect x="0" y="0" width="46" height="46" rx="8" fill="#D8FF57" opacity="0.12" stroke="#D8FF57" stroke-opacity="0.42"/>
        <circle cx="13" cy="15" r="5" stroke="#D8FF57" stroke-width="2"/>
        <circle cx="33" cy="31" r="5" stroke="#D8FF57" stroke-width="2"/>
        <path d="M18 18L28 28" stroke="#D8FF57" stroke-width="2"/>
        <text class="accent" x="60" y="18" font-size="13" letter-spacing="2">BACKEND AND APIS</text>
        <text class="title" x="60" y="45" font-size="23">Domain services</text>
        <text class="muted" x="0" y="82" font-size="14">Node.js 24 LTS, Python 3.12+, FastAPI,</text>
        <text class="muted" x="0" y="105" font-size="14">Pydantic, SQLAlchemy 2, Alembic, Prisma,</text>
        <text class="muted" x="0" y="128" font-size="14">uv, pytest, REST contracts and webhooks.</text>
      </g>
    </g>

    <g transform="translate(700 120)">
      <rect class="panel-purple" x="0" y="0" width="340" height="226" rx="8"/>
      <g transform="translate(24 24)">
        <rect x="0" y="0" width="46" height="46" rx="8" fill="#A78BFA" opacity="0.13" stroke="#A78BFA" stroke-opacity="0.42"/>
        <path d="M10 15C10 10 36 10 36 15V33C36 38 10 38 10 33V15Z" stroke="#C4B5FD" stroke-width="2"/>
        <path d="M10 15C10 20 36 20 36 15M10 24C10 29 36 29 36 24" stroke="#C4B5FD" stroke-width="2"/>
        <text class="purple" x="60" y="18" font-size="13" letter-spacing="2">DATA, AUTH AND INFRA</text>
        <text class="title" x="60" y="45" font-size="23">Multi-tenant base</text>
        <text class="muted" x="0" y="82" font-size="14">PostgreSQL 18, pgvector, Redis 8.2,</text>
        <text class="muted" x="0" y="105" font-size="14">Keycloak 26.6, Docker, Docker Compose,</text>
        <text class="muted" x="0" y="128" font-size="14">AWS, Terraform, Railway, Vercel,</text>
        <text class="muted" x="0" y="151" font-size="14">GitHub Actions and Resend SPI.</text>
      </g>
    </g>

    <g transform="translate(0 374)">
      <rect class="panel-lime" x="0" y="0" width="506" height="218" rx="8"/>
      <g transform="translate(24 24)">
        <rect x="0" y="0" width="46" height="46" rx="8" fill="#D8FF57" opacity="0.12" stroke="#D8FF57" stroke-opacity="0.42"/>
        <path d="M23 8V38M8 23H38M13 13L33 33M33 13L13 33" stroke="#D8FF57" stroke-width="2.2" stroke-linecap="round"/>
        <text class="accent" x="60" y="18" font-size="13" letter-spacing="2">AI, AGENTS AND LLMOPS</text>
        <text class="title" x="60" y="45" font-size="24">Traceable agent systems</text>
        <text class="muted" x="0" y="86" font-size="14">Claude, Claude Code, OpenAI, Codex, Gemini, MCP, LangGraph, LangChain,</text>
        <text class="muted" x="0" y="110" font-size="14">LangSmith, LangFuse, RAG, embeddings, LLM routing, HITL and evaluation.</text>
      </g>
      <g transform="translate(24 158)">
        <rect class="chip-lime" x="0" y="0" width="96" height="34" rx="8"/><text class="accent" x="17" y="22" font-size="12">Claude</text>
        <rect class="chip" x="108" y="0" width="100" height="34" rx="8"/><text class="soft" x="126" y="22" font-size="12">Codex</text>
        <rect class="chip-blue" x="220" y="0" width="108" height="34" rx="8"/><text class="blue" x="238" y="22" font-size="12">MCP</text>
        <rect class="chip-purple" x="340" y="0" width="126" height="34" rx="8"/><text class="purple" x="358" y="22" font-size="12">LangGraph</text>
      </g>
    </g>

    <g transform="translate(534 374)">
      <rect class="panel" x="0" y="0" width="506" height="218" rx="8"/>
      <g transform="translate(24 24)">
        <rect x="0" y="0" width="46" height="46" rx="8" fill="#38BDF8" opacity="0.12" stroke="#38BDF8" stroke-opacity="0.42"/>
        <path d="M23 8L37 14V24C37 33 31 39 23 42C15 39 9 33 9 24V14L23 8Z" stroke="#7DD3FC" stroke-width="2.2"/>
        <path d="M16 24L21 29L31 18" stroke="#7DD3FC" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        <text class="blue" x="60" y="18" font-size="13" letter-spacing="2">ENGINEERING SYSTEM</text>
        <text class="title" x="60" y="45" font-size="24">FORGE discipline in every repo</text>
        <text class="muted" x="0" y="86" font-size="14">ADRs, Definition of Done gates, contract-first tests, Playwright E2E, Vitest,</text>
        <text class="muted" x="0" y="110" font-size="14">CodeQL/SAST, Trivy, Gitleaks, semantic-release, worktrees, smoke checks,</text>
        <text class="muted" x="0" y="134" font-size="14">observability, FinOps and production rollback thinking.</text>
      </g>
      <g transform="translate(24 158)">
        <rect class="chip-blue" x="0" y="0" width="84" height="34" rx="8"/><text class="blue" x="18" y="22" font-size="12">SPEC</text>
        <rect class="chip" x="96" y="0" width="74" height="34" rx="8"/><text class="soft" x="114" y="22" font-size="12">RED</text>
        <rect class="chip-lime" x="182" y="0" width="88" height="34" rx="8"/><text class="accent" x="200" y="22" font-size="12">GREEN</text>
        <rect class="chip-purple" x="282" y="0" width="104" height="34" rx="8"/><text class="purple" x="300" y="22" font-size="12">VERIFY</text>
      </g>
    </g>
  </g>

  <g transform="translate(80 1230)">
    <rect x="0" y="0" width="1040" height="44" rx="8" fill="#07111F" stroke="#253044"/>
    <text class="mono" x="22" y="28" font-size="14">$ forge stack inspect --profile founder</text>
    <text class="mono-strong" x="1018" y="28" font-size="14" text-anchor="end">faith + architecture + agents + gates</text>
  </g>
</svg>
