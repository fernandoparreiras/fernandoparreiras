name: Generate profile dashboard

on:
  schedule:
    # Mondays at 07:17 America/Sao_Paulo (10:17 UTC).
    - cron: "17 10 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate dashboard SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_STATS_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
          PROFILE_USERNAME: fernandoparreiras
        run: node scripts/generate-profile-dashboard.mjs

      - name: Commit updated dashboard
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated profile dashboard"
          file_pattern: assets/profile-dashboard.svg
